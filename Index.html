<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathTalk Oracle V4 - Google Sheets Sync</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .card { 
            background: white; 
            border-radius: 20px; 
            padding: 30px; 
            margin-bottom: 20px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .gradient-text { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        button { 
            padding: 12px 24px; 
            border: none; 
            border-radius: 10px; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.3s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-secondary { background: #e0e7ff; color: #667eea; }
        .btn-success { background: #10b981; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        input, textarea { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid #e0e7ff; 
            border-radius: 10px; 
            font-size: 16px; 
            margin-bottom: 15px;
        }
        input:focus, textarea:focus { outline: none; border-color: #667eea; }
        .message { 
            padding: 15px; 
            border-radius: 15px; 
            margin-bottom: 15px; 
            max-width: 70%;
        }
        .message-student { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white; 
            margin-left: auto;
        }
        .message-ai { background: #f3f4f6; color: #1f2937; }
        .writing-score { 
            display: inline-block; 
            padding: 5px 12px; 
            border-radius: 20px; 
            font-size: 12px; 
            font-weight: 600; 
            margin-left: 10px;
        }
        .score-high { background: #d1fae5; color: #065f46; }
        .score-medium { background: #fef3c7; color: #92400e; }
        .score-low { background: #fee2e2; color: #991b1b; }
        .progress-bar { 
            height: 8px; 
            background: #e0e7ff; 
            border-radius: 10px; 
            overflow: hidden; 
            margin: 10px 0;
        }
        .progress-fill { 
            height: 100%; 
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%); 
            transition: width 0.5s;
        }
        .twr-badge { 
            display: inline-block; 
            padding: 4px 10px; 
            background: #dbeafe; 
            color: #1e40af; 
            border-radius: 12px; 
            font-size: 11px; 
            font-weight: 600; 
            margin: 3px;
        }
        .alert {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .alert-success { background: #d1fae5; color: #065f46; border-left: 4px solid #10b981; }
        .alert-warning { background: #fef3c7; color: #92400e; border-left: 4px solid #f59e0b; }
        .alert-error { background: #fee2e2; color: #991b1b; border-left: 4px solid #ef4444; }
        .alert-info { background: #dbeafe; color: #1e40af; border-left: 4px solid #3b82f6; }
        .stat-card { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white; 
            padding: 20px; 
            border-radius: 15px; 
            text-align: center;
        }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e0e7ff; }
        th { background: #f9fafb; font-weight: 600; color: #667eea; }
        .loading { 
            display: inline-block; 
            width: 20px; 
            height: 20px; 
            border: 3px solid #f3f3f3; 
            border-top: 3px solid #667eea; 
            border-radius: 50%; 
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .sync-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #f3f4f6;
            border-radius: 8px;
            font-size: 14px;
        }
        .sync-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        @media (max-width: 768px) { 
            .grid-2, .grid-3 { grid-template-columns: 1fr; }
            .message { max-width: 85%; }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // State management
        const state = {
            view: 'login',
            userType: null,
            username: '',
            students: [],
            currentStudent: null,
            conversationHistory: [],
            currentInput: '',
            isLoading: false,
            writingData: {},
            sheetUrl: '',
            sheetData: [],
            lastSync: null,
            syncStatus: 'disconnected',
            voiceEnabled: false
        };

        // Writing Revolution vocabulary
        const twrVocab = {
            connectors: ['because', 'so', 'but', 'therefore', 'however', 'although', 'while'],
            mathTerms: ['inverse', 'coefficient', 'divisor', 'isolate', 'factor', 'product', 'quotient', 'sum', 'difference', 'ratio', 'proportion', 'variable', 'equation', 'expression'],
            academicVerbs: ['explain', 'justify', 'compare', 'analyze', 'evaluate', 'describe', 'determine', 'solve', 'calculate']
        };

        const twrTemplates = [
            { name: "Because Frame", template: "I _____ because _____." },
            { name: "So Frame", template: "I did _____, so _____." },
            { name: "But Frame", template: "_____, but _____." },
            { name: "Therefore Frame", template: "I know that _____, therefore _____." },
            { name: "Explain Process", template: "First, I _____. Then, I _____. Finally, I _____." },
            { name: "Compare", template: "_____ is similar to _____ because _____. However, _____." },
            { name: "Justify", template: "I chose _____ because _____. This works when _____." }
        ];

        // Load from localStorage
        function loadData() {
            try {
                const stored = localStorage.getItem('mathtalk_v4_students');
                if (stored) state.students = JSON.parse(stored);

                const writing = localStorage.getItem('mathtalk_v4_writing');
                if (writing) state.writingData = JSON.parse(writing);

                const sheetUrl = localStorage.getItem('mathtalk_v4_sheet_url');
                if (sheetUrl) state.sheetUrl = sheetUrl;

                const lastSync = localStorage.getItem('mathtalk_v4_last_sync');
                if (lastSync) state.lastSync = lastSync;
            } catch (e) {
                console.error('Error loading data:', e);
            }
        }

        // Save to localStorage
        function saveData() {
            localStorage.setItem('mathtalk_v4_students', JSON.stringify(state.students));
            localStorage.setItem('mathtalk_v4_writing', JSON.stringify(state.writingData));
            if (state.sheetUrl) localStorage.setItem('mathtalk_v4_sheet_url', state.sheetUrl);
        }

        // Google Sheets Integration
        function parseGoogleSheetUrl(url) {
            // Extract sheet ID from various Google Sheets URL formats
            const patterns = [
                /\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/,
                /id=([a-zA-Z0-9-_]+)/
            ];
            
            for (let pattern of patterns) {
                const match = url.match(pattern);
                if (match) return match[1];
            }
            return null;
        }

        async function syncWithGoogleSheet() {
            if (!state.sheetUrl) {
                state.syncStatus = 'disconnected';
                return;
            }

            state.syncStatus = 'syncing';
            render();

            try {
                const sheetId = parseGoogleSheetUrl(state.sheetUrl);
                if (!sheetId) {
                    throw new Error('Invalid Google Sheets URL');
                }

                // Construct CSV export URL
                const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv`;
                
                const response = await fetch(csvUrl);
                if (!response.ok) {
                    throw new Error('Could not access sheet. Make sure it is shared as "Anyone with the link can view"');
                }

                const csvText = await response.text();
                const rows = parseCSV(csvText);
                
                if (rows.length < 2) {
                    throw new Error('Sheet appears to be empty');
                }

                // Parse headers and data
                const headers = rows[0].map(h => h.trim().toLowerCase());
                state.sheetData = rows.slice(1).map(row => {
                    const obj = {};
                    headers.forEach((header, i) => {
                        obj[header] = row[i] || '';
                    });
                    return obj;
                });

                state.lastSync = new Date().toISOString();
                localStorage.setItem('mathtalk_v4_last_sync', state.lastSync);
                state.syncStatus = 'connected';
                
                return true;
            } catch (error) {
                console.error('Sync error:', error);
                state.syncStatus = 'error';
                alert(`Sync failed: ${error.message}`);
                return false;
            } finally {
                render();
            }
        }

        function parseCSV(text) {
            const rows = [];
            let currentRow = [];
            let currentField = '';
            let inQuotes = false;

            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const nextChar = text[i + 1];

                if (char === '"') {
                    if (inQuotes && nextChar === '"') {
                        currentField += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === ',' && !inQuotes) {
                    currentRow.push(currentField);
                    currentField = '';
                } else if ((char === '\n' || char === '\r') && !inQuotes) {
                    if (currentField || currentRow.length > 0) {
                        currentRow.push(currentField);
                        rows.push(currentRow);
                        currentRow = [];
                        currentField = '';
                    }
                    if (char === '\r' && nextChar === '\n') i++;
                } else {
                    currentField += char;
                }
            }

            if (currentField || currentRow.length > 0) {
                currentRow.push(currentField);
                rows.push(currentRow);
            }

            return rows;
        }

        function getStudentDataFromSheet(identifier) {
            if (!state.sheetData || state.sheetData.length === 0) return null;

            const student = state.sheetData.find(row => {
                const name = row['student name'] || row['name'] || '';
                const id = row['student id'] || row['id'] || '';
                return name.toLowerCase() === identifier.toLowerCase() || 
                       id.toLowerCase() === identifier.toLowerCase();
            });

            if (!student) return null;

            return {
                name: student['student name'] || student['name'] || identifier,
                id: student['student id'] || student['id'] || '',
                wida: parseFloat(student['wida'] || student['wida level'] || 3.0),
                iReady: parseInt(student['i-ready'] || student['iready'] || student['i-ready score'] || 460),
                unit1: parseInt(student['unit 1'] || student['unit1'] || 0),
                unit2: parseInt(student['unit 2'] || student['unit2'] || 0),
                unit3: parseInt(student['unit 3'] || student['unit3'] || 0),
                notes: student['notes'] || student['teacher notes'] || ''
            };
        }

        async function writeBackToSheet(studentName, data) {
            // Note: This requires Google Apps Script or API with write permissions
            // For now, we'll store locally and provide export functionality
            console.log('Would write back to sheet:', studentName, data);
            // In production, this would use Google Sheets API or Apps Script
        }

        // Get language complexity
        function getLanguageComplexity(widaLevel) {
            if (widaLevel <= 2.0) return 'entering';
            if (widaLevel <= 3.0) return 'emerging';
            if (widaLevel <= 4.0) return 'developing';
            if (widaLevel <= 5.0) return 'expanding';
            return 'bridging';
        }

        // Analyze writing
        function analyzeWriting(text, studentData) {
            const analysis = {
                sentenceCount: 0,
                wordCount: 0,
                twrConnectors: [],
                mathVocabUsed: [],
                academicVerbsUsed: [],
                sentenceComplexity: 0,
                vocabularyScore: 0,
                grammarScore: 0,
                twrScore: 0,
                overallWritingScore: 0,
                feedback: [],
                englishTips: []
            };

            const lowerText = text.toLowerCase();
            const sentences = text.split(/[.!?]+/).filter(s => s.trim().length > 5);
            analysis.sentenceCount = sentences.length;
            analysis.wordCount = text.split(/\s+/).length;

            twrVocab.connectors.forEach(word => {
                if (lowerText.includes(word)) analysis.twrConnectors.push(word);
            });

            twrVocab.mathTerms.forEach(term => {
                if (lowerText.includes(term)) analysis.mathVocabUsed.push(term);
            });

            twrVocab.academicVerbs.forEach(verb => {
                if (lowerText.includes(verb)) analysis.academicVerbsUsed.push(verb);
            });

            if (analysis.sentenceCount > 0) {
                analysis.sentenceComplexity = Math.round(analysis.wordCount / analysis.sentenceCount);
            }

            const vocabUsage = analysis.mathVocabUsed.length + analysis.academicVerbsUsed.length;
            analysis.vocabularyScore = Math.min(100, vocabUsage * 25);
            analysis.twrScore = Math.min(100, analysis.twrConnectors.length * 33);

            const hasCapitalization = /[A-Z]/.test(text);
            const hasPunctuation = /[.!?]/.test(text);
            const hasCompleteThought = analysis.wordCount > 8;
            analysis.grammarScore = (hasCapitalization ? 30 : 0) + (hasPunctuation ? 30 : 0) + (hasCompleteThought ? 40 : 0);

            analysis.overallWritingScore = Math.round(
                (analysis.vocabularyScore * 0.35) + 
                (analysis.twrScore * 0.35) + 
                (analysis.grammarScore * 0.30)
            );

            if (analysis.twrConnectors.length === 0) {
                analysis.feedback.push("Try using connecting words like 'because' or 'so' to explain your thinking.");
                analysis.englishTips.push("'Because' helps you give reasons: 'I chose this answer because...'");
            } else if (analysis.twrConnectors.length === 1) {
                analysis.feedback.push(`Great use of "${analysis.twrConnectors[0]}"! Can you also use "therefore" or "however"?`);
            } else {
                analysis.feedback.push(`Excellent! You used ${analysis.twrConnectors.length} connecting words.`);
            }

            if (analysis.mathVocabUsed.length === 0) {
                analysis.feedback.push("Try using math vocabulary like 'factor', 'quotient', or 'coefficient'.");
            } else {
                analysis.feedback.push(`Strong math vocabulary! You used: ${analysis.mathVocabUsed.join(', ')}`);
            }

            if (studentData && studentData.wida < 3.0) {
                if (analysis.sentenceComplexity < 8) {
                    analysis.englishTips.push("Tip: Try adding more details. Instead of 'I solved it', write 'I solved it by multiplying both sides'");
                }
            }

            return analysis;
        }

        // Generate AI response
        async function generateAIResponse(userMessage, conversationHistory, studentData) {
            state.isLoading = true;
            render();

            try {
                const widaLevel = studentData?.wida || 3.0;
                const complexity = getLanguageComplexity(widaLevel);

                let languageGuidance = '';
                if (complexity === 'entering') {
                    languageGuidance = 'Use VERY simple 5-8 word sentences. Ask yes/no questions. Teach key English words.';
                } else if (complexity === 'emerging') {
                    languageGuidance = 'Use simple 8-12 word sentences. Provide sentence frames like "I think ___ because ___". Teach vocabulary.';
                } else if (complexity === 'developing') {
                    languageGuidance = 'Use clear academic language. Encourage use of "because/so/but". Correct grammar gently.';
                } else {
                    languageGuidance = 'Use grade-level academic language. Push for precise explanations with TWR structures.';
                }

                const systemPrompt = `You are MathTalk Oracle, a 6th-grade math tutor focused on BOTH math understanding AND English language development.

STUDENT PROFILE:
- WIDA Level: ${widaLevel} (${complexity})
- Language Guidance: ${languageGuidance}

YOUR DUAL ROLE:
1. Help student explain math thinking
2. Teach English vocabulary and sentence structures

WRITING REVOLUTION (TWR) FOCUS:
- Encourage students to use: because, so, but, therefore, however
- Model academic sentence structures
- Praise use of math vocabulary

Ask ONE question (10-15 words max) that helps student explain AND practice English.

Respond with ONLY your question, nothing else.`;

                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: 'claude-sonnet-4-20250514',
                        max_tokens: 1000,
                        system: systemPrompt,
                        messages: [
                            { role: 'user', content: `Student said: "${userMessage}"\n\nAsk your next question:` }
                        ]
                    })
                });

                const data = await response.json();
                return data.content.find(item => item.type === 'text')?.text || "Can you explain more?";
            } catch (error) {
                console.error('API Error:', error);
                return "Tell me more about your thinking.";
            } finally {
                state.isLoading = false;
            }
        }

        // Handle student message
        async function handleStudentMessage() {
            if (!state.currentInput.trim()) return;

            const message = state.currentInput.trim();
            const studentData = getStudentDataFromSheet(state.currentStudent.identifier);
            const writingAnalysis = analyzeWriting(message, studentData);

            state.conversationHistory.push({
                role: 'student',
                content: message,
                writingAnalysis,
                timestamp: new Date().toISOString()
            });

            if (!state.writingData[state.currentStudent.identifier]) {
                state.writingData[state.currentStudent.identifier] = {
                    analyses: [],
                    averageScores: { vocabulary: 0, twr: 0, grammar: 0, overall: 0 }
                };
            }
            state.writingData[state.currentStudent.identifier].analyses.push(writingAnalysis);

            const analyses = state.writingData[state.currentStudent.identifier].analyses;
            const avgVocab = analyses.reduce((sum, a) => sum + a.vocabularyScore, 0) / analyses.length;
            const avgTWR = analyses.reduce((sum, a) => sum + a.twrScore, 0) / analyses.length;
            const avgGrammar = analyses.reduce((sum, a) => sum + a.grammarScore, 0) / analyses.length;
            const avgOverall = analyses.reduce((sum, a) => sum + a.overallWritingScore, 0) / analyses.length;

            state.writingData[state.currentStudent.identifier].averageScores = {
                vocabulary: Math.round(avgVocab),
                twr: Math.round(avgTWR),
                grammar: Math.round(avgGrammar),
                overall: Math.round(avgOverall)
            };

            state.currentInput = '';
            render();

            const aiResponse = await generateAIResponse(message, state.conversationHistory, studentData);
            
            state.conversationHistory.push({
                role: 'ai',
                content: aiResponse,
                timestamp: new Date().toISOString()
            });

            if (state.voiceEnabled && window.speechSynthesis) {
                const utterance = new SpeechSynthesisUtterance(aiResponse);
                utterance.rate = 0.9;
                window.speechSynthesis.speak(utterance);
            }

            const updatedStudents = state.students.map(s => {
                if (s.identifier === state.currentStudent.identifier) {
                    return {
                        ...s,
                        conversations: [...(s.conversations || []), {
                            timestamp: new Date().toISOString(),
                            messages: state.conversationHistory
                        }]
                    };
                }
                return s;
            });

            state.students = updatedStudents;
            state.currentStudent = updatedStudents.find(s => s.identifier === state.currentStudent.identifier);
            saveData();
            render();
        }

        // Handle login
        async function handleLogin(type) {
            const input = document.getElementById('username');
            if (input) state.username = input.value.trim();
            
            if (!state.username) return;

            state.userType = type;

            if (type === 'student') {
                // Sync with sheet first
                await syncWithGoogleSheet();

                const studentData = getStudentDataFromSheet(state.username);
                
                let student = state.students.find(s => s.identifier === state.username);
                if (!student) {
                    student = {
                        identifier: state.username,
                        displayName: studentData?.name || state.username,
                        conversations: [],
                        createdAt: new Date().toISOString()
                    };
                    state.students.push(student);
                    saveData();
                }
                
                state.currentStudent = student;
                state.view = 'student';
                state.conversationHistory = [];
            } else {
                await syncWithGoogleSheet();
                state.view = 'teacher';
            }

            render();
        }

        function handleLogout() {
            state.view = 'login';
            state.username = '';
            state.currentStudent = null;
            state.conversationHistory = [];
            state.currentInput = '';
            render();
        }

        async function startConversation() {
            const studentData = getStudentDataFromSheet(state.currentStudent.identifier);
            const aiMessage = await generateAIResponse("Starting conversation", [], studentData);
            
            state.conversationHistory.push({
                role: 'ai',
                content: aiMessage,
                timestamp: new Date().toISOString()
            });
            
            render();
        }

        function toggleVoice() {
            state.voiceEnabled = !state.voiceEnabled;
            render();
        }

        function startVoiceInput() {
            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                const SpeechRecognition = window.webkitSpeechRecognition || window.SpeechRecognition;
                const recognition = new SpeechRecognition();
                recognition.continuous = false;
                recognition.interimResults = false;

                recognition.onresult = (event) => {
                    const transcript = event.results[0][0].transcript;
                    state.currentInput = transcript;
                    render();
                    const input = document.getElementById('messageInput');
                    if (input) input.value = transcript;
                };

                recognition.start();
            } else {
                alert('Voice input not supported. Try Chrome or Edge.');
            }
        }

        function insertTemplate(template) {
            state.currentInput = template;
            render();
            const input = document.getElementById('messageInput');
            if (input) {
                input.value = template;
                input.focus();
            }
        }

        async function connectSheet() {
            const url = document.getElementById('sheetUrlInput')?.value.trim();
            if (!url) return;

            state.sheetUrl = url;
            localStorage.setItem('mathtalk_v4_sheet_url', url);
            
            const success = await syncWithGoogleSheet();
            if (success) {
                alert(`Connected! Found ${state.sheetData.length} students in your sheet.`);
            }
        }

        function exportData() {
            let csv = 'Student Name,Student ID,WIDA,i-Ready,Unit1,Unit2,Unit3,Writing Score,TWR Score,Vocab Score,Grammar Score,Total Conversations,Last Activity,Latest TWR Words,Notes\n';
            
            state.sheetData.forEach(row => {
                const identifier = row['student name'] || row['name'];
                const writing = state.writingData[identifier]?.averageScores || { overall: 0, twr: 0, vocabulary: 0, grammar: 0 };
                const student = state.students.find(s => s.identifier === identifier);
                const latestAnalysis = state.writingData[identifier]?.analyses.slice(-1)[0];
                const twrWords = latestAnalysis?.twrConnectors.join(', ') || '';
                
                csv += `"${row['student name'] || row['name']}","${row['student id'] || row['id'] || ''}",${row['wida'] || row['wida level'] || ''},${row['i-ready'] || row['iready'] || ''},${row['unit 1'] || row['unit1'] || ''},${row['unit 2'] || row['unit2'] || ''},${row['unit 3'] || row['unit3'] || ''},${writing.overall},${writing.twr},${writing.vocabulary},${writing.grammar},${student?.conversations?.length || 0},${student?.conversations?.slice(-1)[0]?.timestamp || ''},"${twrWords}","${row['notes'] || ''}"\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `mathtalk_export_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
        }

        // Render functions
        function renderLogin() {
            return `
                <div class="container" style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
                    <div class="card" style="max-width: 500px; text-align: center;">
                        <h1 class="gradient-text" style="font-size: 48px; margin-bottom: 10px;">MathTalk Oracle</h1>
                        <p style="color: #6b7280; margin-bottom: 10px;">Google Sheets Auto-Sync • V4</p>
                        
                        ${state.syncStatus === 'connected' ? `
                            <div class="alert alert-success" style="margin-bottom: 20px;">
                                ✓ Connected to Google Sheet (${state.sheetData.length} students)
                            </div>
                        ` : state.syncStatus === 'error' ? `
                            <div class="alert alert-error" style="margin-bottom: 20px;">
                                ✗ Sheet connection error. Check Settings.
                            </div>
                        ` : ''}
                        
                        <input 
                            type="text" 
                            id="username" 
                            placeholder="Enter your name or student ID"
                            value="${state.username}"
                            onkeypress="if(event.key==='Enter') handleLogin('student')"
                        />
                        
                        <button class="btn-primary" onclick="handleLogin('student')" style="width: 100%; margin-bottom: 10px;">
                            👨‍🎓 I'm a Student
                        </button>
                        <button class="btn-secondary" onclick="handleLogin('teacher')" style="width: 100%; margin-bottom: 10px;">
                            👨‍🏫 I'm a Teacher
                        </button>
                        <button class="btn-secondary" onclick="showSettings()" style="width: 100%;">
                            ⚙️ Settings
                        </button>

                        ${state.sheetData.length > 0 ? `
                            <p style="margin-top: 20px; font-size: 13px; color: #9ca3af;">
                                ${state.sheetData.length} students loaded from Google Sheet
                            </p>
                        ` : `
                            <p style="margin-top: 20px; font-size: 13px; color: #9ca3af;">
                                Connect your Google Sheet in Settings first
                            </p>
                        `}
                    </div>
                </div>
            `;
        }

        function renderStudent() {
            const studentData = getStudentDataFromSheet(state.currentStudent.identifier);
            const writingData = state.writingData[state.currentStudent.identifier];

            return `
                <div class="container">
                    <div class="card">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                            <div>
                                <h1 style="font-size: 32px; margin-bottom: 5px;">Hello, ${state.currentStudent.displayName}! 👋</h1>
                                <p style="color: #6b7280;">Let's talk about math and practice your English</p>
                            </div>
                            <div style="text-align: right;">
                                ${studentData ? `
                                    <div style="font-size: 12px; color: #6b7280;">WIDA ${studentData.wida} • i-Ready ${studentData.iReady}</div>
                                    ${writingData ? `<div style="font-size: 12px; color: #667eea; font-weight: 600;">Writing: ${writingData.averageScores.overall}%</div>` : ''}
                                ` : ''}
                                <button class="btn-secondary" onclick="handleLogout()" style="margin-top: 10px;">Logout</button>
                            </div>
                        </div>
                    </div>

                    <div class="card" style="height: 500px; display: flex; flex-direction: column;">
                        <div style="flex: 1; overflow-y: auto; padding: 20px; background: #f9fafb; border-radius: 10px; margin-bottom: 20px;">
                            ${state.conversationHistory.length === 0 ? `
                                <div style="text-align: center; padding: 80px 20px;">
                                    <div style="font-size: 64px; margin-bottom: 20px;">💬</div>
                                    <h2 style="color: #374151; margin-bottom: 10px;">Ready to start?</h2>
                                    <p style="color: #6b7280; margin-bottom: 20px;">I'll help you explain your math thinking AND improve your English!</p>
                                    <button class="btn-primary" onclick="startConversation()">Start MathTalk</button>
                                </div>
                            ` : state.conversationHistory.map((msg, i) => {
                                if (msg.role === 'student') {
                                    const scoreClass = msg.writingAnalysis.overallWritingScore >= 70 ? 'score-high' : 
                                                      msg.writingAnalysis.overallWritingScore >= 50 ? 'score-medium' : 'score-low';
                                    return `
                                        <div class="message message-student">
                                            <div>${msg.content}</div>
                                            <div style="margin-top: 10px; font-size: 12px; opacity: 0.9;">
                                                <span class="writing-score ${scoreClass}">Writing: ${msg.writingAnalysis.overallWritingScore}%</span>
                                                ${msg.writingAnalysis.twrConnectors.map(w => `<span class="twr-badge">${w}</span>`).join('')}
                                            </div>
                                            ${msg.writingAnalysis.feedback.length > 0 ? `
                                                <div style="margin-top: 10px; padding: 10px; background: rgba(255,255,255,0.2); border-radius: 8px; font-size: 13px;">
                                                    💡 ${msg.writingAnalysis.feedback[0]}
                                                </div>
                                            ` : ''}
                                        </div>
                                    `;
                                } else {
                                    return `<div class="message message-ai">${msg.content}</div>`;
                                }
                            }).join('')}
                            ${state.isLoading ? '<div style="text-align: center;"><div class="loading"></div></div>' : ''}
                        </div>

                        ${state.conversationHistory.length > 0 ? `
                            <div>
                                <div style="margin-bottom: 10px;">
                                    <button class="btn-secondary" onclick="toggleVoice()" style="margin-right: 5px; font-size: 14px; padding: 8px 16px;">
                                        ${state.voiceEnabled ? '🔊 Voice ON' : '🔇 Voice OFF'}
                                    </button>
                                    <button class="btn-secondary" onclick="startVoiceInput()" style="font-size: 14px; padding: 8px 16px;">
                                        🎤 Speak
                                    </button>
                                </div>

                                <details style="margin-bottom: 10px;">
                                    <summary style="cursor: pointer; padding: 8px; background: #f3f4f6; border-radius: 8px; font-size: 14px;">
                                        ✍️ Writing Templates
                                    </summary>
                                    <div style="padding: 10px; display: flex; flex-wrap: wrap; gap: 5px;">
                                        ${twrTemplates.map(t => `
                                            <button 
                                                onclick="insertTemplate('${t.template}')" 
                                                style="padding: 6px 12px; background: #e0e7ff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px;"
                                            >
                                                ${t.name}
                                            </button>
                                        `).join('')}
                                    </div>
                                </details>

                                <textarea 
                                    id="messageInput"
                                    placeholder="Type or speak your answer..."
                                    rows="3"
                                    onkeypress="if(event.key==='Enter' && !event.shiftKey) { event.preventDefault(); handleStudentMessage(); }"
                                    style="resize: none;"
                                >${state.currentInput}</textarea>
                                <button class="btn-primary" onclick="handleStudentMessage()" style="width: 100%;">
                                    Send Message
                                </button>
                            </div>
                        ` : ''}
                    </div>

                    ${writingData ? `
                        <div class="card">
                            <h3 style="margin-bottom: 20px;">📊 Your Writing Progress</h3>
                            <div class="grid-3">
                                <div>
                                    <div style="font-size: 13px; color: #6b7280; margin-bottom: 5px;">TWR Connectors</div>
                                    <div style="font-size: 28px; font-weight: bold; color: #667eea;">${writingData.averageScores.twr}%</div>
                                    <div class="progress-bar"><div class="progress-fill" style="width: ${writingData.averageScores.twr}%"></div></div>
                                </div>
                                <div>
                                    <div style="font-size: 13px; color: #6b7280; margin-bottom: 5px;">Math Vocabulary</div>
                                    <div style="font-size: 28px; font-weight: bold; color: #667eea;">${writingData.averageScores.vocabulary}%</div>
                                    <div class="progress-bar"><div class="progress-fill" style="width: ${writingData.averageScores.vocabulary}%"></div></div>
                                </div>
                                <div>
                                    <div style="font-size: 13px; color: #6b7280; margin-bottom: 5px;">Grammar</div>
                                    <div style="font-size: 28px; font-weight: bold; color: #667eea;">${writingData.averageScores.grammar}%</div>
                                    <div class="progress-bar"><div class="progress-fill" style="width: ${writingData.averageScores.grammar}%"></div></div>
                                </div>
                            </div>
                        </div>
                    ` : ''}
                </div>
            `;
        }

        function renderTeacher() {
            return `
                <div class="container">
                    <div class="card">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <h1 style="font-size: 32px; margin-bottom: 5px;">Teacher Dashboard</h1>
                                <p style="color: #6b7280;">Google Sheets Auto-Sync Enabled</p>
                            </div>
                            <div style="display: flex; gap: 10px; align-items: center;">
                                ${state.syncStatus === 'connected' ? `
                                    <div class="sync-status">
                                        <div class="sync-indicator"></div>
                                        <span>Synced ${state.lastSync ? new Date(state.lastSync).toLocaleTimeString() : 'now'}</span>
                                    </div>
                                ` : ''}
                                <button class="btn-success" onclick="syncWithGoogleSheet()">🔄 Sync Now</button>
                                <button class="btn-primary" onclick="exportData()">📤 Export</button>
                                <button class="btn-secondary" onclick="showSettings()">⚙️ Settings</button>
                                <button class="btn-secondary" onclick="handleLogout()">Logout</button>
                            </div>
                        </div>
                    </div>

                    ${state.syncStatus === 'connected' && state.sheetData.length > 0 ? `
                        <div class="grid-3">
                            <div class="stat-card">
                                <div style="font-size: 14px; opacity: 0.9; margin-bottom: 5px;">Students in Sheet</div>
                                <div style="font-size: 48px; font-weight: bold;">${state.sheetData.length}</div>
                            </div>
                            <div class="stat-card">
                                <div style="font-size: 14px; opacity: 0.9; margin-bottom: 5px;">Active Conversations</div>
                                <div style="font-size: 48px; font-weight: bold;">${state.students.reduce((sum, s) => sum + (s.conversations?.length || 0), 0)}</div>
                            </div>
                            <div class="stat-card">
                                <div style="font-size: 14px; opacity: 0.9; margin-bottom: 5px;">Avg Writing Score</div>
                                <div style="font-size: 48px; font-weight: bold;">
                                    ${Math.round(Object.values(state.writingData).reduce((sum, w) => sum + (w.averageScores?.overall || 0), 0) / Math.max(Object.keys(state.writingData).length, 1))}%
                                </div>
                            </div>
                        </div>

                        <div class="card">
                            <h2 style="margin-bottom: 20px;">📚 Student Overview</h2>
                            <table>
                                <thead>
                                    <tr>
                                        <th>Student</th>
                                        <th>WIDA</th>
                                        <th>i-Ready</th>
                                        <th>Writing</th>
                                        <th>TWR</th>
                                        <th>Conversations</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${state.sheetData.map(row => {
                                        const identifier = row['student name'] || row['name'];
                                        const student = state.students.find(s => s.identifier === identifier);
                                        const writing = state.writingData[identifier];
                                        
                                        return `
                                            <tr>
                                                <td><strong>${identifier}</strong></td>
                                                <td>${row['wida'] || row['wida level'] || '-'}</td>
                                                <td>${row['i-ready'] || row['iready'] || '-'}</td>
                                                <td>${writing ? `${writing.averageScores.overall}%` : '-'}</td>
                                                <td>${writing ? `${writing.averageScores.twr}%` : '-'}</td>
                                                <td>${student?.conversations?.length || 0}</td>
                                            </tr>
                                        `;
                                    }).join('')}
                                </tbody>
                            </table>
                        </div>
                    ` : `
                        <div class="card">
                            <div class="alert alert-info">
                                <h3 style="margin-bottom: 10px;">📋 Connect Your Google Sheet</h3>
                                <p>Go to Settings to connect your student data spreadsheet.</p>
                            </div>
                        </div>
                    `}
                </div>
            `;
        }

        function showSettings() {
            const settingsHtml = `
                <div class="container" style="padding-top: 40px;">
                    <div class="card" style="max-width: 800px; margin: 0 auto;">
                        <h2 style="margin-bottom: 20px;">⚙️ Settings - Google Sheets Connection</h2>
                        
                        <div class="alert alert-info" style="margin-bottom: 20px;">
                            <h4 style="margin-bottom: 10px;">📋 Setup Instructions:</h4>
                            <ol style="margin-left: 20px; line-height: 1.8;">
                                <li>Open your Google Sheet with student data</li>
                                <li>Click "Share" → Change to "Anyone with the link can view"</li>
                                <li>Copy the sheet URL</li>
                                <li>Paste it below and click "Connect"</li>
                            </ol>
                        </div>

                        <div class="alert alert-warning" style="margin-bottom: 20px;">
                            <h4 style="margin-bottom: 10px;">📊 Required Columns in Your Sheet:</h4>
                            <p style="margin-bottom: 10px;"><strong>Column A:</strong> Student Name (or "Name")</p>
                            <p style="margin-bottom: 10px;"><strong>Column B:</strong> Student ID (optional)</p>
                            <p style="margin-bottom: 10px;"><strong>Column C:</strong> WIDA Level (or "WIDA")</p>
                            <p style="margin-bottom: 10px;"><strong>Column D:</strong> i-Ready Score (or "i-Ready" or "iReady")</p>
                            <p style="margin-bottom: 10px;"><strong>Column E-G:</strong> Unit 1, Unit 2, Unit 3 (optional)</p>
                            <p><strong>Column H:</strong> Notes (optional)</p>
                            <p style="margin-top: 10px; font-size: 13px; opacity: 0.9;"><em>Column names are flexible - the system will find them automatically!</em></p>
                        </div>

                        <label style="display: block; margin-bottom: 5px; font-weight: 600;">Google Sheet URL:</label>
                        <input 
                            type="text" 
                            id="sheetUrlInput" 
                            placeholder="https://docs.google.com/spreadsheets/d/..."
                            value="${state.sheetUrl}"
                            style="margin-bottom: 10px;"
                        />

                        <div style="display: flex; gap: 10px;">
                            <button class="btn-primary" onclick="connectSheet()">🔗 Connect Sheet</button>
                            <button class="btn-secondary" onclick="render()">Back</button>
                        </div>

                        ${state.syncStatus === 'connected' ? `
                            <div class="alert alert-success" style="margin-top: 20px;">
                                <strong>✓ Connected!</strong> Found ${state.sheetData.length} students.<br>
                                Last synced: ${state.lastSync ? new Date(state.lastSync).toLocaleString() : 'just now'}
                            </div>
                        ` : state.syncStatus === 'error' ? `
                            <div class="alert alert-error" style="margin-top: 20px;">
                                <strong>✗ Connection Failed</strong><br>
                                Make sure your sheet is shared as "Anyone with the link can view"
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;

            document.getElementById('app').innerHTML = settingsHtml;
        }

        function render() {
            const app = document.getElementById('app');
            let html = '';

            if (state.view === 'login') html = renderLogin();
            else if (state.view === 'student') html = renderStudent();
            else if (state.view === 'teacher') html = renderTeacher();

            app.innerHTML = html;

            if (state.view === 'student' && state.conversationHistory.length > 0) {
                const input = document.getElementById('messageInput');
                if (input) {
                    input.value = state.currentInput;
                    input.addEventListener('input', (e) => { state.currentInput = e.target.value; });
                }
            }

            if (state.view === 'login') {
                const input = document.getElementById('username');
                if (input) {
                    input.addEventListener('input', (e) => { state.username = e.target.value; });
                }
            }
        }

        // Initialize
        loadData();
        render();
    </script>
</body>
</html>
